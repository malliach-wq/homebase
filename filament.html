<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Filament Inventory</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #222636;
      --border: #2e3248;
      --accent: #6c63ff;
      --accent-hover: #5a52e0;
      --accent-soft: rgba(108,99,255,0.15);
      --text: #e8eaf6;
      --text-muted: #7b82a8;
      --danger: #ff5c6c;
      --danger-soft: rgba(255,92,108,0.15);
      --success: #4ecca3;
      --warning: #ffb347;
      --radius: 12px;
      --radius-sm: 8px;
      --shadow: 0 4px 24px rgba(0,0,0,0.4);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
    }

    /* 芒聰聙芒聰聙 Header 芒聰聙芒聰聙 */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 18px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    header h1 {
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: -0.3px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    header h1 span.icon { font-size: 1.5rem; }

    .header-actions { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }

    .search-wrap {
      position: relative;
    }

    .search-wrap input {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      padding: 8px 14px 8px 36px;
      font-size: 0.9rem;
      width: 220px;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-wrap input:focus { border-color: var(--accent); }
    .search-wrap .search-icon {
      position: absolute;
      left: 11px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 0.85rem;
      pointer-events: none;
    }

    .filter-select {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      padding: 8px 12px;
      font-size: 0.9rem;
      outline: none;
      cursor: pointer;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 9px 18px;
      border-radius: var(--radius-sm);
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: background 0.2s, transform 0.1s;
    }

    .btn:active { transform: scale(0.97); }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-danger { background: var(--danger-soft); color: var(--danger); border: 1px solid var(--danger); }
    .btn-danger:hover { background: var(--danger); color: #fff; }
    .btn-ghost { background: transparent; color: var(--text-muted); border: 1px solid var(--border); }
    .btn-ghost:hover { background: var(--surface2); color: var(--text); }
    .btn-sm { padding: 6px 12px; font-size: 0.82rem; }

    /* 芒聰聙芒聰聙 Stats bar 芒聰聙芒聰聙 */
    .stats-bar {
      display: flex;
      gap: 14px;
      padding: 18px 28px 0;
      flex-wrap: wrap;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 20px;
      min-width: 130px;
      flex: 1;
    }

    .stat-card .label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
    .stat-card .value { font-size: 1.55rem; font-weight: 700; }
    .stat-card .value.accent { color: var(--accent); }
    .stat-card .value.success { color: var(--success); }
    .stat-card .value.warning { color: var(--warning); }

    /* 芒聰聙芒聰聙 Main grid 芒聰聙芒聰聙 */
    main {
      padding: 20px 28px 40px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
      margin-top: 18px;
    }

    /* 芒聰聙芒聰聙 Spool card 芒聰聙芒聰聙 */
    .spool-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      transition: border-color 0.2s, box-shadow 0.2s;
      position: relative;
      overflow: hidden;
    }

    .spool-card:hover {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px var(--accent), var(--shadow);
    }

    .spool-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 4px;
      height: 100%;
      background: var(--card-color, var(--accent));
    }

    .card-top {
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }

    .color-swatch {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 3px solid rgba(255,255,255,0.15);
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    }

    .card-info { flex: 1; min-width: 0; }

    .card-brand {
      font-size: 1rem;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-meta {
      display: flex;
      gap: 6px;
      margin-top: 4px;
      flex-wrap: wrap;
    }

    .tag {
      font-size: 0.72rem;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 99px;
      background: var(--surface2);
      color: var(--text-muted);
      border: 1px solid var(--border);
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    .tag.material { background: var(--accent-soft); color: var(--accent); border-color: var(--accent); }

    .card-actions {
      display: flex;
      gap: 6px;
      margin-left: auto;
      flex-shrink: 0;
    }

    .icon-btn {
      width: 30px;
      height: 30px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      font-size: 0.85rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }

    .icon-btn:hover { background: var(--surface2); color: var(--text); }
    .icon-btn.delete:hover { background: var(--danger-soft); color: var(--danger); border-color: var(--danger); }

    /* Weight bar */
    .weight-section {}

    .weight-labels {
      display: flex;
      justify-content: space-between;
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .weight-labels .remaining { font-weight: 700; color: var(--text); font-size: 0.9rem; }

    .weight-bar-bg {
      height: 8px;
      background: var(--surface2);
      border-radius: 99px;
      overflow: hidden;
    }

    .weight-bar-fill {
      height: 100%;
      border-radius: 99px;
      transition: width 0.4s ease;
      background: linear-gradient(90deg, var(--accent), var(--success));
    }

    .weight-bar-fill.low { background: linear-gradient(90deg, var(--danger), var(--warning)); }
    .weight-bar-fill.medium { background: linear-gradient(90deg, var(--warning), var(--success)); }

    .spool-note {
      font-size: 0.82rem;
      color: var(--text-muted);
      background: var(--surface2);
      border-radius: var(--radius-sm);
      padding: 8px 10px;
      line-height: 1.5;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.78rem;
      color: var(--text-muted);
    }

    .location-chip {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    /* 芒聰聙芒聰聙 Empty state 芒聰聙芒聰聙 */
    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-muted);
    }

    .empty-state .big-icon { font-size: 4rem; margin-bottom: 16px; }
    .empty-state h2 { font-size: 1.2rem; color: var(--text); margin-bottom: 8px; }
    .empty-state p { font-size: 0.9rem; margin-bottom: 24px; }

    /* 芒聰聙芒聰聙 Modal 芒聰聙芒聰聙 */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }

    .modal-overlay.open { opacity: 1; pointer-events: all; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      width: 100%;
      max-width: 500px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: var(--shadow);
      transform: scale(0.95);
      transition: transform 0.2s;
    }

    .modal-overlay.open .modal { transform: scale(1); }

    .modal-header {
      padding: 20px 24px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .modal-header h2 { font-size: 1.1rem; font-weight: 700; }

    .modal-body { padding: 20px 24px; display: flex; flex-direction: column; gap: 16px; }
    .modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; gap: 10px; justify-content: flex-end; }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .field { display: flex; flex-direction: column; gap: 6px; }
    .field label { font-size: 0.82rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.4px; }

    .field input,
    .field select,
    .field textarea {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      padding: 9px 12px;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
      font-family: inherit;
    }

    .field input:focus,
    .field select:focus,
    .field textarea:focus { border-color: var(--accent); }

    .field textarea { resize: vertical; min-height: 72px; }

    .field input[type="color"] {
      padding: 4px 8px;
      height: 42px;
      cursor: pointer;
    }

    .color-row { display: flex; gap: 10px; align-items: flex-end; }
    .color-row .field:first-child { flex: 0 0 60px; }
    .color-row .field:last-child { flex: 1; }

    .toggle-row {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
    }

    .toggle-row label { font-size: 0.88rem; color: var(--text); cursor: pointer; flex: 1; }

    .toggle {
      position: relative;
      width: 40px;
      height: 22px;
      flex-shrink: 0;
    }

    .toggle input { opacity: 0; width: 0; height: 0; }

    .slider {
      position: absolute;
      inset: 0;
      background: var(--border);
      border-radius: 99px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .slider::before {
      content: '';
      position: absolute;
      height: 16px;
      width: 16px;
      left: 3px;
      bottom: 3px;
      background: white;
      border-radius: 50%;
      transition: transform 0.2s;
    }

    .toggle input:checked + .slider { background: var(--accent); }
    .toggle input:checked + .slider::before { transform: translateX(18px); }

    /* 芒聰聙芒聰聙 Toast 芒聰聙芒聰聙 */
    #toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 20px;
      font-size: 0.88rem;
      z-index: 999;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.25s, transform 0.25s;
      pointer-events: none;
      max-width: 320px;
    }

    #toast.show { opacity: 1; transform: translateY(0); }
    #toast.success { border-color: var(--success); color: var(--success); }
    #toast.error { border-color: var(--danger); color: var(--danger); }

    /* 芒聰聙芒聰聙 Responsive 芒聰聙芒聰聙 */
    @media (max-width: 600px) {
      header { padding: 14px 16px; }
      main { padding: 14px 16px 40px; }
      .stats-bar { padding: 14px 16px 0; }
      .form-row { grid-template-columns: 1fr; }
      .search-wrap input { width: 160px; }
    }
  </style>
</head>
<body>

<header>
  <h1><span class="icon">冒聼搂碌</span> Filament Inventory</h1>
  <div class="header-actions">
    <div class="search-wrap">
      <span class="search-icon">冒聼聰聧</span>
      <input type="text" id="search" placeholder="Search spools芒聙娄" oninput="renderGrid()" />
    </div>
    <select class="filter-select" id="filterMaterial" onchange="renderGrid()">
      <option value="">All materials</option>
    </select>
    <button class="btn btn-primary" onclick="openModal()">茂录聥 Add Spool</button>
  </div>
</header>

<div class="stats-bar" id="statsBar"></div>

<main>
  <div class="grid" id="grid"></div>
</main>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modalTitle">Add New Spool</h2>
      <button class="icon-btn" onclick="closeModal()" title="Close">芒聹聲</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="field">
          <label>Brand</label>
          <input type="text" id="fBrand" placeholder="e.g. Bambu, Hatchbox" />
        </div>
        <div class="field">
          <label>Material</label>
          <select id="fMaterial">
            <option>PLA</option>
            <option>PETG</option>
            <option>ABS</option>
            <option>ASA</option>
            <option>TPU</option>
            <option>Nylon (PA)</option>
            <option>PC</option>
            <option>PLA+</option>
            <option>PETG-CF</option>
            <option>PLA-CF</option>
            <option>Resin</option>
            <option>Other</option>
          </select>
        </div>
      </div>

      <div class="color-row">
        <div class="field">
          <label>Color</label>
          <input type="color" id="fColorPicker" value="#6c63ff" oninput="syncColorName()" />
        </div>
        <div class="field">
          <label>Color name</label>
          <input type="text" id="fColorName" placeholder="e.g. Galaxy Purple" />
        </div>
      </div>

      <div class="form-row">
        <div class="field">
          <label>Remaining (g)</label>
          <input type="number" id="fRemaining" placeholder="e.g. 800" min="0" step="1" />
        </div>
        <div class="field">
          <label>Full weight (g)</label>
          <input type="number" id="fFullWeight" placeholder="e.g. 1000" min="1" step="1" value="1000" />
        </div>
      </div>

      <div class="toggle-row">
        <label for="fWithSpool">Weight includes spool</label>
        <label class="toggle">
          <input type="checkbox" id="fWithSpool" />
          <span class="slider"></span>
        </label>
      </div>

      <div class="field">
        <label>Storage location</label>
        <input type="text" id="fLocation" placeholder="e.g. Shelf A, Dry box 2" />
      </div>

      <div class="field">
        <label>Notes</label>
        <textarea id="fNotes" placeholder="Drying status, print settings, anything芒聙娄"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveSpool()">Save Spool</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
  // 芒聰聙芒聰聙 Storage 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
  const STORAGE_KEY = 'filament_inventory_v1';

  function load() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
    catch { return []; }
  }

  function save(spools) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(spools));
  }

  let spools = load();
  let editingId = null;

  // 芒聰聙芒聰聙 Helpers 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
  function uid() {
    return Date.now().toString(36) + Math.random().toString(36).slice(2);
  }

  function pct(remaining, full) {
    if (!full || full <= 0) return 0;
    return Math.min(100, Math.max(0, Math.round((remaining / full) * 100)));
  }

  function barClass(p) {
    if (p <= 25) return 'low';
    if (p <= 60) return 'medium';
    return '';
  }

  function escHtml(s) {
    return String(s ?? '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function toast(msg, type = 'success') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'show ' + type;
    clearTimeout(el._t);
    el._t = setTimeout(() => { el.className = ''; }, 2800);
  }

  // 芒聰聙芒聰聙 Stats 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
  function renderStats() {
    const totalSpools = spools.length;
    const totalGrams = spools.reduce((s, sp) => s + (Number(sp.remaining) || 0), 0);
    const materials = [...new Set(spools.map(sp => sp.material))].length;
    const low = spools.filter(sp => {
      const p = pct(Number(sp.remaining) || 0, Number(sp.fullWeight) || 1000);
      return p <= 25;
    }).length;

    document.getElementById('statsBar').innerHTML = `
      <div class="stat-card">
        <div class="label">Total spools</div>
        <div class="value accent">${totalSpools}</div>
      </div>
      <div class="stat-card">
        <div class="label">Total filament</div>
        <div class="value success">${totalGrams >= 1000 ? (totalGrams / 1000).toFixed(2) + ' kg' : totalGrams + ' g'}</div>
      </div>
      <div class="stat-card">
        <div class="label">Materials</div>
        <div class="value">${materials}</div>
      </div>
      <div class="stat-card">
        <div class="label">Running low</div>
        <div class="value ${low > 0 ? 'warning' : ''}">${low}</div>
      </div>
    `;
  }

  // 芒聰聙芒聰聙 Filter selects 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
  function updateMaterialFilter() {
    const sel = document.getElementById('filterMaterial');
    const current = sel.value;
    const materials = [...new Set(spools.map(s => s.material))].sort();
    sel.innerHTML = '<option value="">All materials</option>' +
      materials.map(m => `<option value="${escHtml(m)}" ${m === current ? 'selected' : ''}>${escHtml(m)}</option>`).join('');
  }

  // 芒聰聙芒聰聙 Grid render 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
  function renderGrid() {
    const query = document.getElementById('search').value.toLowerCase();
    const matFilter = document.getElementById('filterMaterial').value;

    let filtered = spools.filter(sp => {
      const hay = [sp.brand, sp.material, sp.colorName, sp.location, sp.notes].join(' ').toLowerCase();
      return (!query || hay.includes(query)) && (!matFilter || sp.material === matFilter);
    });

    renderStats();
    updateMaterialFilter();

    const grid = document.getElementById('grid');

    if (filtered.length === 0) {
      grid.innerHTML = `
        <div class="empty-state" style="grid-column:1/-1">
          <div class="big-icon">冒聼陋拢</div>
          <h2>${spools.length === 0 ? 'No spools yet' : 'No matches found'}</h2>
          <p>${spools.length === 0 ? 'Add your first filament spool to get started.' : 'Try adjusting your search or filter.'}</p>
          ${spools.length === 0 ? '<button class="btn btn-primary" onclick="openModal()">茂录聥 Add Spool</button>' : ''}
        </div>`;
      return;
    }

    grid.innerHTML = filtered.map(sp => {
      const remaining = Number(sp.remaining) || 0;
      const fullWeight = Number(sp.fullWeight) || 1000;
      const p = pct(remaining, fullWeight);
      const bc = barClass(p);
      const color = sp.color || '#6c63ff';

      return `
        <div class="spool-card" style="--card-color:${color}">
          <div class="card-top">
            <div class="color-swatch" style="background:${color}" title="${escHtml(sp.colorName)}"></div>
            <div class="card-info">
              <div class="card-brand">${escHtml(sp.brand || 'Unknown brand')}</div>
              <div class="card-meta">
                <span class="tag material">${escHtml(sp.material)}</span>
                ${sp.colorName ? `<span class="tag">${escHtml(sp.colorName)}</span>` : ''}
                ${sp.withSpool ? '<span class="tag">w/ spool</span>' : '<span class="tag">filament only</span>'}
              </div>
            </div>
            <div class="card-actions">
              <button class="icon-btn" onclick="editSpool('${sp.id}')" title="Edit">芒聹聫茂赂聫</button>
              <button class="icon-btn delete" onclick="deleteSpool('${sp.id}')" title="Delete">冒聼聴聭茂赂聫</button>
            </div>
          </div>

          <div class="weight-section">
            <div class="weight-labels">
              <span class="remaining">${remaining}g remaining</span>
              <span>${p}% of ${fullWeight}g</span>
            </div>
            <div class="weight-bar-bg">
              <div class="weight-bar-fill ${bc}" style="width:${p}%"></div>
            </div>
          </div>

          ${sp.notes ? `<div class="spool-note">${escHtml(sp.notes)}</div>` : ''}

          <div class="card-footer">
            ${sp.location
              ? `<span class="location-chip">冒聼聯娄 ${escHtml(sp.location)}</span>`
              : '<span></span>'
            }
            <span>${p <= 25 ? '芒職聽茂赂聫 Running low' : p >= 90 ? '芒聹聟 Full' : ''}</span>
          </div>
        </div>`;
    }).join('');
  }

  // 芒聰聙芒聰聙 Modal 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
  function openModal(spool = null) {
    editingId = spool ? spool.id : null;
    document.getElementById('modalTitle').textContent = spool ? 'Edit Spool' : 'Add New Spool';

    document.getElementById('fBrand').value      = spool?.brand      ?? '';
    document.getElementById('fMaterial').value   = spool?.material   ?? 'PLA';
    document.getElementById('fColorPicker').value = spool?.color     ?? '#6c63ff';
    document.getElementById('fColorName').value  = spool?.colorName  ?? '';
    document.getElementById('fRemaining').value  = spool?.remaining  ?? '';
    document.getElementById('fFullWeight').value = spool?.fullWeight ?? 1000;
    document.getElementById('fWithSpool').checked = spool?.withSpool ?? false;
    document.getElementById('fLocation').value   = spool?.location   ?? '';
    document.getElementById('fNotes').value      = spool?.notes      ?? '';

    document.getElementById('modalOverlay').classList.add('open');
    setTimeout(() => document.getElementById('fBrand').focus(), 50);
  }

  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('open');
    editingId = null;
  }

  function handleOverlayClick(e) {
    if (e.target === document.getElementById('modalOverlay')) closeModal();
  }

  function syncColorName() {
    // optional: user can still type their own name
  }

  function saveSpool() {
    const brand     = document.getElementById('fBrand').value.trim();
    const material  = document.getElementById('fMaterial').value;
    const color     = document.getElementById('fColorPicker').value;
    const colorName = document.getElementById('fColorName').value.trim();
    const remaining = parseFloat(document.getElementById('fRemaining').value);
    const fullWeight = parseFloat(document.getElementById('fFullWeight').value);
    const withSpool = document.getElementById('fWithSpool').checked;
    const location  = document.getElementById('fLocation').value.trim();
    const notes     = document.getElementById('fNotes').value.trim();

    if (!brand) { toast('Please enter a brand name.', 'error'); return; }
    if (isNaN(remaining) || remaining < 0) { toast('Enter a valid remaining weight.', 'error'); return; }
    if (isNaN(fullWeight) || fullWeight <= 0) { toast('Enter a valid full spool weight.', 'error'); return; }

    if (editingId) {
      const idx = spools.findIndex(s => s.id === editingId);
      if (idx !== -1) {
        spools[idx] = { ...spools[idx], brand, material, color, colorName, remaining, fullWeight, withSpool, location, notes };
        toast('Spool updated! 芒聹聟');
      }
    } else {
      spools.unshift({ id: uid(), brand, material, color, colorName, remaining, fullWeight, withSpool, location, notes, createdAt: Date.now() });
      toast('Spool added! 冒聼搂碌');
    }

    save(spools);
    closeModal();
    renderGrid();
  }

  // 芒聰聙芒聰聙 Edit / Delete 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
  function editSpool(id) {
    const spool = spools.find(s => s.id === id);
    if (spool) openModal(spool);
  }

  function deleteSpool(id) {
    const spool = spools.find(s => s.id === id);
    if (!spool) return;
    if (!confirm(`Delete "${spool.brand} ${spool.material}" spool? This cannot be undone.`)) return;
    spools = spools.filter(s => s.id !== id);
    save(spools);
    toast('Spool deleted.', 'error');
    renderGrid();
  }

  // 芒聰聙芒聰聙 Keyboard 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModal();
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
      if (document.getElementById('modalOverlay').classList.contains('open')) saveSpool();
    }
  });

  // 芒聰聙芒聰聙 Init 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
  renderGrid();
</script>
