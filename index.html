<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home Base</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f5f5;
    --surface: #fff;
    --border: #e8e8e8;
    --border2: #d0d0d0;
    --text: #1a1a1a;
    --muted: #888;
    --muted2: #bbb;
    --accent: #714b67;
    --green: #16a34a;
    --green-bg: #dcfce7;
    --amber: #d97706;
    --amber-bg: #fef3c7;
    --red: #dc2626;
    --red-bg: #fee2e2;
    --blue: #2563eb;
    --blue-bg: #dbeafe;
    --radius: 10px;
    --radius-sm: 6px;
  }

  body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
  }

  /* ── Topbar ── */
  .topbar {
    height: 56px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 28px;
    gap: 10px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .topbar-logo {
    width: 28px; height: 28px;
    background: var(--accent);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 14px; font-weight: 600;
    flex-shrink: 0;
  }
  .topbar-title { font-size: 0.9rem; font-weight: 500; color: #555; }
  .topbar-date  { margin-left: auto; font-size: 0.78rem; color: var(--muted); }

  /* ── Layout ── */
  main {
    max-width: 960px;
    margin: 0 auto;
    padding: 28px 24px 60px;
  }

  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 24px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 20px;
  }
  .stat-card .s-label { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
  .stat-card .s-value { font-size: 1.75rem; font-weight: 600; color: var(--text); line-height: 1; }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }
  .col-full { grid-column: 1 / -1; }

  /* ── Cards ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
  }

  .card-title {
    font-size: 0.82rem;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.07em;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 7px;
  }

  /* ── Progress bar ── */
  .progress-wrap { margin-bottom: 14px; }
  .progress-label { display: flex; justify-content: space-between; font-size: 0.75rem; color: var(--muted); margin-bottom: 5px; }
  .progress-bar { height: 4px; background: var(--border); border-radius: 99px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 99px; transition: width 0.4s ease; }

  /* ── Tabs ── */
  .tabs { display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; }
  .tab {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 4px 12px;
    border-radius: 99px;
    font-size: 0.75rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'Inter', sans-serif;
  }
  .tab.active, .tab:hover {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }

  /* ── Chores ── */
  .chore-list { display: flex; flex-direction: column; gap: 6px; }
  .chore-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: background 0.15s;
    user-select: none;
  }
  .chore-item:hover { background: #fafafa; }
  .chore-item.done { opacity: 0.45; }
  .chore-item.done .chore-name { text-decoration: line-through; }
  .chore-check {
    width: 18px; height: 18px; border-radius: 4px;
    border: 1.5px solid var(--border2); flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; transition: all 0.15s;
  }
  .chore-item.done .chore-check { background: var(--green); border-color: var(--green); color: #fff; }
  .chore-name { font-size: 0.85rem; flex: 1; }
  .chore-badge {
    font-size: 0.68rem; font-weight: 500;
    padding: 2px 8px; border-radius: 99px;
    background: var(--bg); color: var(--muted);
    border: 1px solid var(--border);
  }
  .chore-badge.today { background: var(--amber-bg); color: var(--amber); border-color: transparent; }
  .chore-badge.overdue { background: var(--red-bg); color: var(--red); border-color: transparent; }

  /* ── To-do ── */
  .todo-list { display: flex; flex-direction: column; gap: 6px; max-height: 240px; overflow-y: auto; }
  .todo-item {
    display: flex; align-items: flex-start; gap: 9px;
    padding: 10px 12px; border: 1px solid var(--border);
    border-radius: var(--radius-sm); cursor: pointer; transition: background 0.15s;
  }
  .todo-item:hover { background: #fafafa; }
  .todo-item.done { opacity: 0.4; }
  .todo-item.done .todo-text { text-decoration: line-through; }
  .todo-check {
    width: 17px; height: 17px; border-radius: 4px;
    border: 1.5px solid var(--border2); flex-shrink: 0; margin-top: 1px;
    transition: all 0.15s; display: flex; align-items: center; justify-content: center; font-size: 10px;
  }
  .todo-item.done .todo-check { background: var(--accent); border-color: var(--accent); color: #fff; }
  .todo-text { flex: 1; line-height: 1.4; font-size: 0.85rem; }
  .todo-pri {
    font-size: 0.68rem; font-weight: 500;
    padding: 2px 8px; border-radius: 99px; margin-top: 1px; flex-shrink: 0;
  }
  .todo-pri.high { background: var(--red-bg); color: var(--red); }
  .todo-pri.med  { background: var(--amber-bg); color: var(--amber); }
  .todo-pri.low  { background: var(--green-bg); color: var(--green); }

  /* ── Shopping ── */
  .shop-list { display: flex; flex-direction: column; gap: 6px; max-height: 260px; overflow-y: auto; }
  .shop-item {
    display: flex; align-items: center; gap: 9px;
    padding: 9px 12px; border: 1px solid var(--border);
    border-radius: var(--radius-sm); transition: background 0.15s;
  }
  .shop-item:hover { background: #fafafa; }
  .shop-item.bought { opacity: 0.4; }
  .shop-item.bought .shop-name { text-decoration: line-through; }
  .shop-check {
    width: 16px; height: 16px; border-radius: 4px;
    border: 1.5px solid var(--border2); flex-shrink: 0; cursor: pointer;
    transition: all 0.15s; display: flex; align-items: center; justify-content: center; font-size: 10px;
  }
  .shop-item.bought .shop-check { background: var(--green); border-color: var(--green); color: #fff; }
  .shop-name { flex: 1; font-size: 0.85rem; }
  .shop-cat { font-size: 0.7rem; color: var(--muted); }
  .shop-del { color: var(--muted2); cursor: pointer; font-size: 0.8rem; transition: color 0.15s; padding: 2px 4px; }
  .shop-del:hover { color: var(--red); }

  /* ── Inventory ── */
  .inv-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .inv-item {
    padding: 10px 12px; border: 1px solid var(--border);
    border-radius: var(--radius-sm);
  }
  .inv-name { font-size: 0.82rem; font-weight: 500; margin-bottom: 4px; }
  .inv-status { font-size: 0.72rem; font-weight: 500; margin-bottom: 6px; }
  .inv-status.ok  { color: var(--green); }
  .inv-status.low { color: var(--amber); }
  .inv-status.out { color: var(--red); }
  .inv-dots { display: flex; gap: 3px; }
  .inv-dot {
    flex: 1; height: 3px; border-radius: 99px;
    background: var(--border); cursor: pointer; transition: background 0.15s;
  }
  .inv-dot.active-ok  { background: var(--green); }
  .inv-dot.active-low { background: var(--amber); }
  .inv-dot.active-out { background: var(--red); }

  /* ── Add row ── */
  .add-row { display: flex; gap: 7px; margin-top: 12px; }
  .add-input {
    flex: 1; background: #fff;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text); padding: 8px 12px;
    font-size: 0.82rem; font-family: 'Inter', sans-serif;
    outline: none; transition: border-color 0.2s;
  }
  .add-input:focus { border-color: var(--accent); }
  .add-input::placeholder { color: var(--muted2); }
  .btn {
    background: var(--accent); color: #fff; border: none;
    border-radius: var(--radius-sm); padding: 8px 14px;
    font-size: 0.82rem; font-weight: 500; cursor: pointer;
    transition: opacity 0.15s; font-family: 'Inter', sans-serif;
    white-space: nowrap;
  }
  .btn:hover { opacity: 0.85; }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

  @media (max-width: 600px) {
    .grid { grid-template-columns: 1fr; }
    .col-full { grid-column: 1; }
    main { padding: 20px 16px 60px; }
    .stats-row { grid-template-columns: repeat(3,1fr); gap: 8px; }
    .topbar { padding: 0 16px; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-logo">H</div>
  <span class="topbar-title">Home Base</span>
  <span class="topbar-date" id="dateStr"></span>
</div>

<main>

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="s-label">Chores done today</div>
      <div class="s-value" id="statDone">0</div>
    </div>
    <div class="stat-card">
      <div class="s-label">Items to buy</div>
      <div class="s-value" id="statShop">0</div>
    </div>
    <div class="stat-card">
      <div class="s-label">Tasks pending</div>
      <div class="s-value" id="statTodo">0</div>
    </div>
  </div>

  <div class="grid">

    <!-- CHORES -->
    <div class="card">
      <div class="card-title">🧹 Recurring Chores</div>
      <div class="tabs" id="choreTabs">
        <button class="tab active" onclick="filterChores('all',this)">All</button>
        <button class="tab" onclick="filterChores('daily',this)">Daily</button>
        <button class="tab" onclick="filterChores('weekly',this)">Weekly</button>
        <button class="tab" onclick="filterChores('monthly',this)">Monthly</button>
      </div>
      <div class="progress-wrap">
        <div class="progress-label"><span>Today's progress</span><span id="choresProgress">0%</span></div>
        <div class="progress-bar"><div class="progress-fill" id="choresBar" style="width:0%"></div></div>
      </div>
      <div class="chore-list" id="choreList"></div>
      <div class="add-row">
        <input class="add-input" id="choreInput" placeholder="Add chore…" onkeydown="if(event.key==='Enter')addChore()">
        <select class="add-input" id="choreFreq" style="flex:0;width:90px;">
          <option value="daily">Daily</option>
          <option value="weekly">Weekly</option>
          <option value="monthly">Monthly</option>
        </select>
        <button class="btn" onclick="addChore()">+</button>
      </div>
    </div>

    <!-- TO-DO -->
    <div class="card">
      <div class="card-title">📋 One-Time Tasks</div>
      <div class="todo-list" id="todoList"></div>
      <div class="add-row">
        <input class="add-input" id="todoInput" placeholder="Add task…" onkeydown="if(event.key==='Enter')addTodo()">
        <select class="add-input" id="todoPri" style="flex:0;width:80px;">
          <option value="high">High</option>
          <option value="med">Med</option>
          <option value="low">Low</option>
        </select>
        <button class="btn" onclick="addTodo()">+</button>
      </div>
    </div>

    <!-- SHOPPING -->
    <div class="card">
      <div class="card-title">🛒 Shopping List</div>
      <div class="shop-list" id="shopList"></div>
      <div class="add-row">
        <input class="add-input" id="shopInput" placeholder="Add item…" onkeydown="if(event.key==='Enter')addShopItem()">
        <input class="add-input" id="shopCat" placeholder="Category" style="flex:0;width:90px;" onkeydown="if(event.key==='Enter')addShopItem()">
        <button class="btn" onclick="addShopItem()">+</button>
      </div>
    </div>

    <!-- INVENTORY -->
    <div class="card">
      <div class="card-title">📦 Home Inventory</div>
      <div class="inv-grid" id="invGrid"></div>
      <div class="add-row" style="margin-top:12px;">
        <input class="add-input" id="invName" placeholder="Item name…" onkeydown="if(event.key==='Enter')addInvItem()">
        <select class="add-input" id="invLevel" style="flex:0;width:80px;">
          <option value="ok">Full</option>
          <option value="low">Low</option>
          <option value="out">Out</option>
        </select>
        <button class="btn" onclick="addInvItem()">+</button>
      </div>
    </div>

  </div>
</main>

<script>
let state = JSON.parse(localStorage.getItem('homebase') || 'null') || {
  chores: [
    {id:1, name:"Make bed", freq:"daily", done:false},
    {id:2, name:"Wash dishes", freq:"daily", done:false},
    {id:3, name:"Wipe counters", freq:"daily", done:false},
    {id:4, name:"Vacuum", freq:"weekly", done:false},
    {id:5, name:"Mop floors", freq:"weekly", done:false},
    {id:6, name:"Clean bathroom", freq:"weekly", done:false},
    {id:7, name:"Change bed sheets", freq:"weekly", done:false},
    {id:8, name:"Clean oven", freq:"monthly", done:false},
    {id:9, name:"Dust shelves", freq:"monthly", done:false},
  ],
  shopping: [
    {id:1, name:"Milk", cat:"Dairy", bought:false},
    {id:2, name:"Bread", cat:"Pantry", bought:false},
    {id:3, name:"Dish soap", cat:"Cleaning", bought:false},
  ],
  inventory: [
    {id:1, name:"Toilet paper", level:"ok"},
    {id:2, name:"Laundry detergent", level:"low"},
    {id:3, name:"Dish soap", level:"ok"},
    {id:4, name:"Paper towels", level:"out"},
    {id:5, name:"Trash bags", level:"ok"},
    {id:6, name:"Sponges", level:"low"},
  ],
  todos: [
    {id:1, text:"Call plumber about leak", pri:"high", done:false},
    {id:2, text:"Buy new lightbulb for kitchen", pri:"med", done:false},
    {id:3, text:"Organize hall closet", pri:"low", done:false},
  ]
};
let choreFilter = 'all';
let nextId = 100;

function save() { localStorage.setItem('homebase', JSON.stringify(state)); }

document.getElementById('dateStr').textContent =
  new Date().toLocaleDateString('en-US', {weekday:'long', month:'long', day:'numeric'});

function updateStats() {
  document.getElementById('statDone').textContent = state.chores.filter(c=>c.done).length;
  document.getElementById('statShop').textContent = state.shopping.filter(s=>!s.bought).length;
  document.getElementById('statTodo').textContent = state.todos.filter(t=>!t.done).length;
}

// ── Chores ──
function renderChores() {
  const filtered = choreFilter === 'all' ? state.chores : state.chores.filter(c=>c.freq===choreFilter);
  const daily = state.chores.filter(c=>c.freq==='daily');
  const pct = daily.length ? Math.round(daily.filter(c=>c.done).length / daily.length * 100) : 0;
  document.getElementById('choresProgress').textContent = pct + '%';
  document.getElementById('choresBar').style.width = pct + '%';
  document.getElementById('choreList').innerHTML = filtered.map(c => `
    <div class="chore-item ${c.done?'done':''}" onclick="toggleChore(${c.id})">
      <div class="chore-check">${c.done?'✓':''}</div>
      <div class="chore-name">${c.name}</div>
      <div class="chore-badge ${c.freq==='daily'?'today':''}">${c.freq}</div>
    </div>
  `).join('');
  updateStats();
}
function toggleChore(id) {
  const c = state.chores.find(x=>x.id===id);
  if(c){ c.done=!c.done; save(); renderChores(); }
}
function filterChores(f,el) {
  choreFilter=f;
  document.querySelectorAll('#choreTabs .tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  renderChores();
}
function addChore() {
  const inp=document.getElementById('choreInput');
  const freq=document.getElementById('choreFreq').value;
  if(!inp.value.trim()) return;
  state.chores.push({id:nextId++, name:inp.value.trim(), freq, done:false});
  inp.value=''; save(); renderChores();
}

// ── Todos ──
function renderTodos() {
  document.getElementById('todoList').innerHTML = state.todos.map(t => `
    <div class="todo-item ${t.done?'done':''}" onclick="toggleTodo(${t.id})">
      <div class="todo-check">${t.done?'✓':''}</div>
      <div class="todo-text">${t.text}</div>
      <div class="todo-pri ${t.pri}">${t.pri}</div>
    </div>
  `).join('');
  updateStats();
}
function toggleTodo(id) {
  const t=state.todos.find(x=>x.id===id);
  if(t){ t.done=!t.done; save(); renderTodos(); }
}
function addTodo() {
  const inp=document.getElementById('todoInput');
  const pri=document.getElementById('todoPri').value;
  if(!inp.value.trim()) return;
  state.todos.push({id:nextId++, text:inp.value.trim(), pri, done:false});
  inp.value=''; save(); renderTodos();
}

// ── Shopping ──
function renderShopping() {
  document.getElementById('shopList').innerHTML = state.shopping.map(s => `
    <div class="shop-item ${s.bought?'bought':''}">
      <div class="shop-check" onclick="toggleShop(${s.id})">${s.bought?'✓':''}</div>
      <div class="shop-name">${s.name}</div>
      <div class="shop-cat">${s.cat||''}</div>
      <div class="shop-del" onclick="deleteShop(${s.id})">✕</div>
    </div>
  `).join('');
  updateStats();
}
function toggleShop(id) {
  const s=state.shopping.find(x=>x.id===id);
  if(s){ s.bought=!s.bought; save(); renderShopping(); }
}
function deleteShop(id) {
  state.shopping=state.shopping.filter(x=>x.id!==id);
  save(); renderShopping();
}
function addShopItem() {
  const inp=document.getElementById('shopInput');
  const cat=document.getElementById('shopCat').value.trim();
  if(!inp.value.trim()) return;
  state.shopping.push({id:nextId++, name:inp.value.trim(), cat, bought:false});
  inp.value=''; document.getElementById('shopCat').value='';
  save(); renderShopping();
}

// ── Inventory ──
function renderInventory() {
  const labels={ok:'Well stocked', low:'Running low', out:'Out — restock!'};
  document.getElementById('invGrid').innerHTML = state.inventory.map(item => `
    <div class="inv-item">
      <div class="inv-name">${item.name}</div>
      <div class="inv-status ${item.level}">${labels[item.level]}</div>
      <div class="inv-dots">
        ${['ok','low','out'].map(l=>`
          <div class="inv-dot ${item.level===l?'active-'+l:''}"
               onclick="setInvLevel(${item.id},'${l}')"></div>
        `).join('')}
      </div>
    </div>
  `).join('');
}
function setInvLevel(id,level) {
  const item=state.inventory.find(x=>x.id===id);
  if(item){ item.level=level; save(); renderInventory(); }
}
function addInvItem() {
  const inp=document.getElementById('invName');
  const level=document.getElementById('invLevel').value;
  if(!inp.value.trim()) return;
  state.inventory.push({id:nextId++, name:inp.value.trim(), level});
  inp.value=''; save(); renderInventory();
}

// ── Init ──
renderChores(); renderShopping(); renderInventory(); renderTodos();
</script>
</body>
</html>
